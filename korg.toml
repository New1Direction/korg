# korg Swarm cognitive configuration surface
default_llm = "ollama"
default_model = "llama3-70b-monochrome"

[ollama]
base_url = "http://localhost:11434/v1"

# ─────────────────────────────────────────────────────────────
# Per-Persona LLM Overrides
#
# Each persona can use a different provider and model.
# If not specified, falls back to default_llm / default_model.
#
# Example: heterogeneous swarm using multiple vendors
# ─────────────────────────────────────────────────────────────

# [openai]
# api_key = "sk-..."

# [anthropic]
# api_key = "sk-ant-..."

# [personas.captain]
# provider = "openai"
# model = "o3"               # Deep reasoning for planning & decomposition
# temperature = 0.2

# [personas.harper]
