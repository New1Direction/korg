# ─────────────────────────────────────────────────────────────
# Free-Tier LLM Rotator Layer Configuration
#
# The rotator provider implements automatic failover, dynamic 60s cooldowns,
# and round-robin fallback across free-tier or alternative endpoints.
#
# To use the rotator as the global default or for a specific persona, set:
# default_llm = "rotator"
# ─────────────────────────────────────────────────────────────

